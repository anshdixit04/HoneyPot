# Local prototype compose file — see docs/03-prototype-spec.md for scope.
# Cowrie is bound to 127.0.0.1 only. Do NOT change these bindings to 0.0.0.0
# until Phase 4 (public deployment) in docs/01-build-steps.md is complete.
#
# Phase 3 isolation hardening (see docs/02-design-doc.md section 6, threat
# model): assume Cowrie gets fully compromised beyond its intended
# emulation layer. Everything below limits what that buys an attacker.
#
# Network egress note: we tried putting Cowrie on a Docker `internal: true`
# network (no route out at all) behind a tiny TCP relay for the published
# ports, since Docker won't publish ports on internal-only networks. That
# broke something more important than it fixed: a plain TCP relay
# terminates and re-originates the connection, so Cowrie only ever saw the
# relay's own container IP as src_ip — killing GeoIP/the map, the actual
# point of this project. Preserving the attacker's real IP requires
# kernel-level DNAT (which is what Docker's normal `ports:` publishing
# already uses, and what Cowrie's own docs assume — see the
# `reported_port` comment in cowrie.cfg.dist: "useful if you use iptables
# to forward ports to Cowrie"), not an application-level proxy. Host-level
# iptables egress filtering on the real Linux VPS is the correct way to
# get isolation without losing src_ip — that's a Phase 4 deployment step,
# not something Docker Desktop on Windows can do cleanly. Container-level
# hardening below (dropped capabilities, read-only root, resource limits)
# doesn't have this trade-off and is fully in effect now.

services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie
    ports:
      # host:container — SSH honeypot on 2222, Telnet on 2223.
      - "127.0.0.1:2222:2222"
      - "127.0.0.1:2223:2223"
    volumes:
      # Bind mount so the local Python shipper (running outside Docker in
      # the prototype) can tail the JSON log directly. Switch to a named
      # volume + in-network shipper container once this leaves prototype
      # stage (Phase 4+).
      #
      # COWRIE_LOG_HOST_DIR override: on machines where the repo lives
      # under a cloud-sync folder (OneDrive/Dropbox/etc.), the sync
      # client's file locking conflicts with Cowrie's log rotation. Set
      # COWRIE_LOG_HOST_DIR in infra/.env to a non-synced directory.
      - ${COWRIE_LOG_HOST_DIR:-../data/cowrie-logs}:/cowrie/cowrie-git/var/log/cowrie
    restart: unless-stopped
    networks:
      # Its own dedicated network — no other service/container shares it,
      # so a compromised Cowrie has no Docker-network path to anything
      # else on this host beyond what Docker Desktop's host-gateway DNS
      # (host.docker.internal) exposes (a Windows/Mac Docker Desktop
      # quirk; not present by default on a real Linux VPS in Phase 4).
      - honeypot_net
    read_only: true
    tmpfs:
      # Cowrie/Twisted want a writable /tmp; keep it in memory rather than
      # on disk so nothing persists there across a restart.
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128

networks:
  honeypot_net:
    driver: bridge
